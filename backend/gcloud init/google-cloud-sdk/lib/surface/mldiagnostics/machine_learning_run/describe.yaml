- release_tracks:
  - ALPHA
  auto_generated: false
  help_text:
    brief: View the details of a machine learning run.
    description: View the details of a machine learning run resource.
    examples: |-
      To get details of the machine learning run, run:

          $ {command} my-run --location=us-central1 --format json

          Sample output:
          ```
            {
              "artifacts": {
                "gcsPath": "gs://diagon-prod-data"
              },
              "createTime": "2026-02-05T16:25:28.367865234Z",
              "displayName": "gcloud-cli-run",
              "endTime": "0001-01-01T00:00:00Z",
              "etag": "1f54a7f4-bd25-4f98-a91c-97bfa1c5b7a6",
              "labels": {
                "on_demand_xprof": "enabled"
              },
              "name": "projects/PROJECT_ID/locations/us-central1/machineLearningRuns/my-run",
              "orchestrator": "GKE",
              "runPhase": "ACTIVE",
              "runSet": "group-gcloud-cli",
              "tools": [
                {
                  "xprof": {}
                }
              ],
              "updateTime": "2026-02-05T16:25:28.367865344Z",
              "workloadDetails": {
                "gke": {
                  "cluster": "projects/PROJECT_ID/locations/us-central1/clusters/mldiag-prod-cluster",
                  "id": "mldiag-prod-demo-jobset",
                  "kind": "JobSet",
                  "namespace": "diagon"
                }
              }
            }
          ```
            `
  arguments:
    params:
    - help_text: |-
        projects/{project}/locations/{location}/machineLearningRuns/{machineLearningRun}
      is_positional: true
      is_primary_resource: true
      resource_spec: !REF googlecloudsdk.command_lib.mldiagnostics.machine_learning_run.v1alpha_resources:projects_locations_machine_learning_runs
      required: true
  request:
    api_version: v1alpha
    collection:
    - hypercomputecluster.projects.locations.machineLearningRuns
