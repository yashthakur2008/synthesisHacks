- release_tracks:
  - ALPHA
  auto_generated: false
  help_text:
    brief: Create a machine learning run
    description: Create a machine learning run.
    examples: |-
      To create the new machine learning run, run:

          $ {command} gcloud-cli-run-id-01 --orchestrator gke --run-group group-gcloud-cli
          --tools xprof --gcs-path gs://diagon-prod-data-bucket --display-name gcloud-cli-run
          --gke-cluster-name projects/PROJECT_ID/locations/us-central1/clusters/mldiag-prod-gke-cluster
          projects/PROJECT_ID/locations/us-central1/clusters/mldiag-prod-gke-cluster
          --gke-namespace diagon --gke-workload-name mldiag-prod-demo-jobset --gke-kind JobSet
          --gke-workload-create-time 2026-02-20T06:00:00Z --labels "created_by"="cli"
          --run-phase ACTIVE

          Sample output:
          ```
            Create request issued for: [gcloud-cli-run-id-01]
            Waiting for operation [projects/PROJECT_ID/locations/us-central1/operations/operation-1770308728284-64a161ee4640d-38e79884-425e56e2] to complete...done.
            Created machine_learning_run [gcloud-cli-run-id-01].
          ```

          If user want to list all the profiler session capture in Google Cloud Storage bucket (recursively), create a special machine learning run with a special lable `list_existing_sessions_only` as shown below:

          $ {command} gcloud-cli-run-id-02 --run-group group-gcloud-cli
          --gcs-path gs://diagon-prod-data-bucket/my-parent-directory --display-name gcloud-cli-run-02
          --labels "created_by"="cli" --labels "list_existing_sessions_only"="true"

          This will create a machine learning run in COMPLETED state without any workload
          details. User can navigate to the profiler list page to see all the
          profiler sessions captured under gs://diagon-prod-data-bucket/my-parent-directory (recursively).
          User can visualize any profiler session by passing the link and share it with others.
          No further update is possible for this machine learning run as it is marked as COMPLETED.

  arguments:
    params:
    - help_text: |-
        Identifier. The name of the Machine Learning run. If not provided, a random UUID will be generated.
      is_positional: true
      is_primary_resource: true
      request_id_field: machineLearningRunId
      resource_spec: !REF googlecloudsdk.command_lib.mldiagnostics.machine_learning_run.v1alpha_resources:projects_locations_machine_learning_runs
      required: true
    - arg_name: display-name
      api_field: machineLearningRun.displayName
      required: false
      repeated: false
      help_text: |-
        Display name for the run.
    - arg_name: run-group
      api_field: machineLearningRun.runGroup
      required: false
      default: ''
      repeated: false
      help_text: |-
        Allows grouping of similar runs.
         * Helps improve UI rendering performance.
         * Allows comparing similar runs via fast filters.
    - group:
        api_field: machineLearningRun.configs
        required: false
        help_text: |-
          Configuration for a Machine Learning run.
        params:
        - arg_name: configs-software
          api_field: machineLearningRun.configs.softwareConfigs
          required: false
          repeated: true
          help_text: |-
            Software configs.
          spec:
          - api_field: key
          - api_field: value
        - arg_name: configs-hardware
          api_field: machineLearningRun.configs.hardwareConfigs
          required: false
          repeated: true
          help_text: |-
            Hardware configs.
          spec:
          - api_field: key
          - api_field: value
    - arg_name: tools
      api_field: machineLearningRun.tools
      required: false
      default: xprof
      repeated: true
      help_text: |-
        List of tools enabled for this run. This is a repeated argument, and each instance
        configures one tool. If no tools are specified, XProf will be used by default by the service.

        To enable XProf without a specific session ID:
          `--tools=xprof`
        To enable XProf with a specific session ID:
          `--tools=xprof:sessionId=my-session-id`
        To enable multiple tools, repeat the argument:
          `--tools=xprof:sessionId=123 --tools=nsys`
      spec:
      - api_field: xprof
        one_of_index: 0
        help_text: |-
          Configuration for the XProf tool.
        spec:
        - api_field: sessionId
          help_text: |-
            The session ID for XProf.
            Example: `my-session-id`
    - arg_name: labels
      api_field: machineLearningRun.labels
      required: false
      repeated: true
      help_text: |-
        Any custom labels for this run
        Example: type:workload, type:simulation etc.
      spec:
      - api_field: key
      - api_field: value
    - group:
        api_field: machineLearningRun.artifacts
        required: false
        help_text: |-
          Represents information about the artifacts of the Machine Learning Run.
        params:
        - arg_name: gcs-path
          api_field: machineLearningRun.artifacts.gcsPath
          required: true
          repeated: false
          help_text: |-
            The Cloud Storage path where the artifacts of the run are stored.
            Example: `gs://my-bucket/my-run-directory`.
    - arg_name: orchestrator
      api_field: machineLearningRun.orchestrator
      required: false
      help_text: |-
        The orchestrator used for the run.
      choices:
      - arg_value: gce
        enum_value: GCE
        help_text: |-
          Google Compute Engine orchestrator.
      - arg_value: gke
        enum_value: GKE
        help_text: |-
          Google Kubernetes Engine orchestrator.
      - arg_value: slurm
        enum_value: SLURM
        help_text: |-
          Slurm cluster orchestrator.
    - group:
        api_field: machineLearningRun.workloadDetails
        required: false
        help_text: |-
          Workload details associated for the Machine Learning Run.
          Workload have different metadata based on the orchestrator like
          GKE cluster, Slurm cluster, Google Compute Engine instance etc.
        params:
        - group:
            mutex: true
            help_text: |-
              Arguments for the metadata.
            params:
            - group:
                api_field: machineLearningRun.workloadDetails.gke
                required: false
                help_text: |-
                  Workload details for the GKE orchestrator.
                params:
                - arg_name: gke-workload-name
                  api_field: machineLearningRun.workloadDetails.gke.id
                  required: false
                  repeated: false
                  help_text: |-
                    The identifier of the workload. Example - jobset-abcd
                - arg_name: gke-kind
                  api_field: machineLearningRun.workloadDetails.gke.kind
                  required: false
                  repeated: false
                  help_text: |-
                    The kind of the workload. Example - JobSet
                - arg_name: gke-cluster-name
                  api_field: machineLearningRun.workloadDetails.gke.cluster
                  required: false
                  repeated: false
                  help_text: |-
                    The cluster of the workload.
                    Example - /projects/<project id>/locations/<location>/clusters/<cluster
                    name>
                - arg_name: gke-namespace
                  api_field: machineLearningRun.workloadDetails.gke.namespace
                  required: false
                  repeated: false
                  help_text: |-
                    The namespace of the workload. Example - default
                - arg_name: gke-workload-create-time
                  api_field: machineLearningRun.workloadDetails.gke.createTime
                  required: false
                  repeated: false
                  help_text: |-
                    The create timestamp of the workload.
                    Example - 2026-02-20T06:00:00Z
    - arg_name: run-phase
      api_field: machineLearningRun.runPhase
      required: false
      default: active
      help_text: |-
        RunPhase defines the phase of the run. This should be used only if non standard
        machine learning run needs to be created. If not specified, run phase will be set to active by default.
      choices:
      - arg_value: active
        enum_value: ACTIVE
        help_text: |-
          Run is active.
      - arg_value: completed
        enum_value: COMPLETED
        help_text: |-
          Run is completed.
      - arg_value: failed
        enum_value: FAILED
        help_text: |-
          Run is failed.
  request:
    api_version: v1alpha
    collection:
    - hypercomputecluster.projects.locations.machineLearningRuns
  async:
    collection:
    - hypercomputecluster.projects.locations.operations
