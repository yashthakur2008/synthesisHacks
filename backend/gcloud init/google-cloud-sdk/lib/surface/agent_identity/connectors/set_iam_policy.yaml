- release_tracks: [ALPHA]

  help_text:
    brief: Set the IAM policy for an Agent Identity connector.
    description: |
      This command replaces the existing IAM policy for a connector, given a connector
      and a file encoded in JSON or YAML that contains the IAM policy.
    examples: |
      The following command will read an IAM policy defined in a JSON file
      'policy.json' and set it for a connector with identifier
      'my-connector' and location 'us-central1':

        $ {command} my-connector policy.json --location=us-central1

  request:
    api_version: v1alpha
    collection: iamconnectors.projects.locations.connectors

  arguments:
    resource:
      help_text: The connector for which to set the IAM policy.
      spec: !REF googlecloudsdk.command_lib.agent_identity.v1alpha_resources:projects_locations_connectors
