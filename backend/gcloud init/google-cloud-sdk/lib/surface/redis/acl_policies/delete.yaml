- release_tracks: [ALPHA, BETA, GA]
  help_text:
    brief: |
      Delete a Redis ACL Policy.
    description: |
      Delete a Redis ACL Policy.
      This command can fail for the following reasons:
        * The ACL Policy specified does not exist.
        * The active account does not have permission to access the given
          ACL Policy.
    examples: |
      To delete a ACL Policy with the name `my-acl-policy` in `us-central1` region, run:
      $ {command} my-acl-policy --region=us-central1
  arguments:
    resource:
      spec: !REF googlecloudsdk.command_lib.redis.resources:acl_policy
      help_text:
        Arguments and flags that specify the Redis ACL Policy you want to delete.
  async:
    collection: redis.projects.locations.operations
  input:
    confirmation_prompt: |
      You are about to delete acl policy [{__name__}] in [{locationsId}].
      Any associated data will be lost.
  request:
    ALPHA:
      api_version: v1alpha1
    BETA:
      api_version: v1beta1
    GA:
      api_version: v1
    collection: redis.projects.locations.aclPolicies
