release_tracks: [ALPHA, BETA]

help_text:
  brief: |
    Import an AgentGateway.
  description: |
    Import a agent gateway.
  examples: |
    To import a agent gateway named 'my-agentgateway' from a YAML file, run:

    $ {command} my-agent-gateway --location=us-central1 --source=my-agentgateway.yaml

request:
  collection: networkservices.projects.locations.agentGateways
  ALPHA:
    api_version: v1alpha1
  BETA:
    api_version: v1beta1

arguments:
  resource:
    spec: !REF googlecloudsdk.command_lib.network_services.resources:agentGateway
    help_text: Name of the agent gateway to import.

async:
  collection: networkservices.projects.locations.operations

import:
  abort_if_equivalent: true
  create_if_not_exists: true
  create_request:
    collection: networkservices.projects.locations.agentGateways
    ALPHA:
      api_version: v1alpha1
    BETA:
      api_version: v1beta1
    method: create
