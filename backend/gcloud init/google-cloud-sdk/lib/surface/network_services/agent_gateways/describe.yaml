release_tracks: [ALPHA, BETA]

help_text:
  brief: |
    Describe a Agent Gateway.
  description: Show details of an Agent Gateway.

  examples: |
    Show details about an Agent Gateway named 'my-agent-gateway'.

        $ {command} my-agent-gateway --location=us-central1

arguments:
  resource:
    spec: !REF googlecloudsdk.command_lib.network_services.resources:agentGateway
    help_text: Name of the agent gateway to describe.

request:
  ALPHA:
    api_version: v1alpha1
  BETA:
    api_version: v1beta1
  collection: networkservices.projects.locations.agentGateways
