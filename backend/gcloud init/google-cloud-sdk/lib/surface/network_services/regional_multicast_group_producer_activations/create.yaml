release_tracks: [ALPHA]
help_text:
  brief: |
    Create a regional multicast group producer activation.
  description: |
    Create a regional multicast group producer activation in the specified location of the current project.
  examples: |
    Create a regional multicast group producer activation with the name 'my-rmgpa',
    regional-multicast-group-range-activation 'path-to-rmgra',
    multicast-producer-association 'path-to-rmpa',
    and location 'region'.

      $ {command} my-rmgpa --regional-multicast-group-range-activation=path-to-rmgra --regional-multicast-producer-association=path-to-rmpa --location=region

arguments:
  resource:
    spec: !REF googlecloudsdk.command_lib.network_services.resources:regionalMulticastGroupProducerActivation
    help_text: |
      Name of the regional multicast group producer activation to be created.
  params:
  - arg_name: regional-multicast-group-range-activation
    api_field: regionalMulticastGroupProducerActivation.regionalMulticastGroupRangeActivation
    help_text: The regional multicast group range activation to be used.
    required: true
  - arg_name: regional-multicast-producer-association
    api_field: regionalMulticastGroupProducerActivation.regionalMulticastProducerAssociation
    help_text: The regional multicast producer association to be used.
    required: true
  - arg_name: interconnect-attachments
    api_field: regionalMulticastGroupProducerActivation.interconnectAttachments
    repeated: true
    help_text: The interconnect attachments to be used.
  - arg_name: description
    api_field: regionalMulticastGroupProducerActivation.description
    help_text: The description for the regional multicast group producer activation.
  labels:
    api_field: regionalMulticastGroupProducerActivation.labels
async:
  collection: networkservices.projects.locations.operations
request:
  ALPHA:
    api_version: v1alpha1
  collection: networkservices.projects.locations.regionalMulticastGroupProducerActivations
  method: create
