release_tracks: [ALPHA]
help_text:
  brief: |
    Create a regional multicast producer association.
  description: |
    Create a regional multicast producer association in the specified location of the current project.
  examples: |
    Create a regional multicast producer association with the name 'my-rmpa',
    multicast-domain-activation 'path-to-rmda',
    network 'path-to-network',
    and location 'region'.

      $ {command} my-rmpa --regional-multicast-domain-activation=path-to-rmda --network=path-to-network --location=region

arguments:
  resource:
    spec: !REF googlecloudsdk.command_lib.network_services.resources:regionalMulticastProducerAssociation
    help_text: |
      Name of the regional multicast producer association to be created.
  params:
  - arg_name: regional-multicast-domain-activation
    api_field: regionalMulticastProducerAssociation.regionalMulticastDomainActivation
    help_text: The regional multicast domain activation to be used.
    required: true
  - arg_name: network
    api_field: regionalMulticastProducerAssociation.network
    help_text: The network to be used.
    required: true
  - arg_name: description
    api_field: regionalMulticastProducerAssociation.description
    help_text: The description for the regional multicast producer association.
  labels:
    api_field: regionalMulticastProducerAssociation.labels
async:
  collection: networkservices.projects.locations.operations
request:
  ALPHA:
    api_version: v1alpha1
  collection: networkservices.projects.locations.regionalMulticastProducerAssociations
  method: create
