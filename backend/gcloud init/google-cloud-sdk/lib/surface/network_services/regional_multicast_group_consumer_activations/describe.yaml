release_tracks: [ALPHA]
help_text:
  brief: |
    Describe a regional multicast group consumer activation.
  description: |
    Show details of a regional multicast group consumer activation in the specified location of the current project.
  examples: |
    To describe details of a regional multicast group consumer activation in the current project and location, run:

      $ {command} my-rmgca --location=region
arguments:
  resource:
    spec: !REF googlecloudsdk.command_lib.network_services.resources:regionalMulticastGroupConsumerActivation
    help_text: |
      The regional multicast group consumer activation to display.
request:
  ALPHA:
    api_version: v1alpha1
  collection: networkservices.projects.locations.regionalMulticastGroupConsumerActivations
