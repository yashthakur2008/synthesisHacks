- release_tracks: [ALPHA, BETA]
  help_text:
    brief: Create Flag Revision
    description: |-
      Create a new flag revision resource. Flag revisions act as immutable snapshots
      of a flag's configuration (variants, rules, and allocations) at a specific
      point in time.

      This snapshot is a required prerequisite for creating a Flag Release and
      initiating a Flag Rollout. Creating a revision ensures that the configuration
      state is frozen and safely decoupled from the live flag definition during the
      rollout process.
    examples: |-
      To create a Flag Revision for a flag named `my-flag` in the `global` location, run:

          $ {command} my-revision-v1 --flag=my-flag --location=global

      To create a revision using a fully qualified resource name for the revision ID, run:

          $ {command} projects/my-project/locations/global/flagRevisions/my-revision-v1 --flag=my-flag

      To create a revision with metadata for tracking, run:

          $ {command} prod-ready-rev --flag=search-optimizations --location=us-central1 --labels=env=prod,owner=search-team --annotations=ticket=123
  arguments:
    params:
    - help_text: |-
        Flag Revision ID. Google Cloud resource name (full URI of the resource) following the standard naming
        scheme:

          "projects/{project}/locations/{location}/flagRevisions/{flag_revision_id}"
      is_positional: true
      request_id_field: flagRevisionId
      resource_spec: !REF googlecloudsdk.command_lib.saas_runtime.resources:flag_revision
      required: true
      repeated: false

    - arg_name: flag
      help_text: |-
        Name (ID) of the Flag this is a revision of.
      is_positional: false
      resource_spec: !REF googlecloudsdk.command_lib.saas_runtime.resources:flag
      resource_method_params:
        flagRevision.flag: '{__relative_name__}'
      required: true
      repeated: false

    - arg_name: labels
      api_field: flagRevision.labels
      required: false
      repeated: true
      help_text: |-
        Labels on the resource, which can be used for categorization.
      spec:
      - api_field: key
      - api_field: value

    - arg_name: annotations
      api_field: flagRevision.annotations
      required: false
      repeated: true
      help_text: |-
        Annotations is an unstructured key-value map stored with a resource that
        may be set by external tools to store and retrieve arbitrary metadata.
        They are not queryable and should be preserved when modifying objects.
      spec:
      - api_field: key
      - api_field: value

  request:
    api_version: v1beta1
    collection:
    - saasservicemgmt.projects.locations.flagRevisions
