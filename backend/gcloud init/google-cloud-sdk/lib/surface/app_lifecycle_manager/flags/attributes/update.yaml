- release_tracks: [ALPHA, BETA]
  help_text:
    brief: Update Flag Attribute
    description: |-
      Update the metadata of a Flag Attribute. This command allows you to modify labels and
      annotations associated with the resource.

      Flag Attributes are foundational resources that define the evaluation context such as
      'userID', 'tenantID', or 'region' used by targeting rules and randomization algorithms
      to determine flag values.

      Note that core fields like the attribute key and value type are immutable after creation
      to maintain evaluation consistency across your service. This command is primarily used
      for categorization via labels or for attaching audit metadata via annotations.
    examples: |-
      To update labels and annotations for a flag attribute, run:

          $ {command} my-attribute --location=global --labels=env=prod --annotations=ticket=123
  arguments:
    params:
    - help_text: |-
        Flag Attribute ID. Flag Attribute ID. Google Cloud resource name (full URI of the resource) following the standard naming scheme:

          "projects/{project}/locations/{location}/flagAttributes/{flag_attribute_id}"
      is_positional: true
      request_id_field: flagAttributeId
      resource_spec: !REF googlecloudsdk.command_lib.saas_runtime.resources:flag_attribute
      required: true

    - arg_name: labels
      api_field: flagAttribute.labels
      clearable: true
      required: false
      repeated: true
      help_text: |-
        The labels on the resource, which can be used for categorization.
      spec:
      - api_field: key
      - api_field: value

    - arg_name: annotations
      api_field: flagAttribute.annotations
      clearable: true
      required: false
      repeated: true
      help_text: |-
        Annotations is an unstructured key-value map stored with a resource that
        may be set by external tools to store and retrieve arbitrary metadata.
        They are not queryable and should be preserved when modifying objects.
      spec:
      - api_field: key
      - api_field: value

  request:
    api_version: v1beta1
    collection:
    - saasservicemgmt.projects.locations.flagAttributes
  update:
    read_modify_update: true
