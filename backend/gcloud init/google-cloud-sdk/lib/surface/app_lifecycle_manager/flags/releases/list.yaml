- release_tracks: [ALPHA, BETA]
  help_text:
    brief: List Flag Releases
    description: |-
      List all Flag Releases available in a specific location for your SaaS offerings.

      A Flag Release represents a versioned snapshot of one or more flags associated with a
      specific UnitKind. It serves as the baseline for flag rollouts and is the primary
      mechanism for synchronizing flag configurations across a fleet of units.
    examples: |-
      To list all Flag Releases across all locations in the current project, run:

          $ {command}

      To list Flag Releases for a specific location (e.g., `us-central1`), run:

          $ {command} --location=us-central1

      To filter releases belonging to a specific UnitKind, run:

          $ {command} --filter="unitKind:my-unit-kind"

      To list releases and output in JSON format for automation/scripting, run:

          $ {command} --format=json
  arguments:
    resource:
      help_text: |-
        Location in which to list Flag Releases.
      spec: !REF googlecloudsdk.command_lib.saas_runtime.resources:project_location_with_default
  request:
    api_version: v1beta1
    collection:
    - saasservicemgmt.projects.locations.flagReleases
  response:
    id_field: name
