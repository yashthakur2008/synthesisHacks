- release_tracks: [ALPHA, BETA]
  help_text:
    brief: Describe Flag Release
    description: |-
      Show detailed information about a Flag Release resource.

      A Flag Release is a configuration snapshot that groups one or more Flag Revisions
      for a specific UnitKind. This command retrieves the list of revisions, target
      UnitKind, and other metadata. It is the primary tool for auditing the
      content of a rollout.

      For automated processing, use `--format=json` or `--format=yaml` to retrieve the
      structured representation of the release, which can be used to programmatically
      verify rollout configurations or generate recovery scripts.
    examples: |-
      To describe a Flag Release named `my-release` in the `global` location, run:

          $ {command} my-release --location=global

      To describe a Flag Release using its fully qualified resource name, run:

          $ {command} projects/my-project/locations/global/flagReleases/my-release

      To inspect the revisions in JSON format for automated auditing or recovery, run:

          $ {command} my-release --location=global --format=json
  arguments:
    params:
    - help_text: |-
        Flag Release ID of the Flag Release to describe.
      is_positional: true
      resource_spec: !REF googlecloudsdk.command_lib.saas_runtime.resources:flag_release
      required: true
  request:
    api_version: v1beta1
    collection:
    - saasservicemgmt.projects.locations.flagReleases
