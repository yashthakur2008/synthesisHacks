- release_tracks: [ALPHA, BETA]
  help_text:
    brief: Update a Flag Release.
    description: |-
      Update the administrative metadata of an existing Flag Release. This command
      modifies the resource's labels (for categorization and filtering) and
      annotations (for external tool metadata).

      Note that Flag Releases are immutable snapshots of flag configurations. This
      command does not modify the flag revisions or the associated UnitKind. To
      change the flag logic or revisions associated with a UnitKind, you must
      create a new Flag Release and initiate a Rollout. This architecture ensures
      that once a release is created, its behavioral payload remains constant while
      allowing for operational metadata updates.
    examples: |-
      To update labels and annotations for a flag release, run:

          $ {command} my-release --location=us-central1 --labels=env=prod --annotations=ticket=123
  arguments:
    params:
    - help_text: |-
        ID of the Flag Release:

          "projects/{project}/locations/{location}/flagReleases/{flag_release_id}"

        This follows the standard Google Cloud naming scheme (URI).
      is_positional: true
      request_id_field: flagReleaseId
      resource_spec: !REF googlecloudsdk.command_lib.saas_runtime.resources:flag_release
      required: true

    - arg_name: labels
      api_field: flagRelease.labels
      clearable: true
      required: false
      repeated: true
      help_text: |-
        The labels on the resource, which can be used for categorization.
      spec:
      - api_field: key
      - api_field: value

    - arg_name: annotations
      api_field: flagRelease.annotations
      clearable: true
      required: false
      repeated: true
      help_text: |-
        Unstructured key-value map stored with a resource that may be set by
        external tools to store and retrieve arbitrary metadata. Annotations
        are not queryable and should be preserved when modifying objects.
      spec:
      - api_field: key
      - api_field: value

  request:
    api_version: v1beta1
    collection:
    - saasservicemgmt.projects.locations.flagReleases
  update:
    read_modify_update: true
