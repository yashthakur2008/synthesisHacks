- release_tracks: [ALPHA]
  help_text:
    brief: Creates a BigLake Hive database.
    description: |
      Creates a BigLake Hive database.
    examples: |-
      To create a BigLake Hive database named `my-database` in catalog `my-catalog`, run:

        $ {command} my-database --catalog=my-catalog

      To create a BigLake Hive database named `my-database` in catalog `my-catalog`, with bucket `gs://my-bucket`, properties `key1=value1,key2=value2` and description `My new database`, run:

        $ {command} my-database --catalog=my-catalog --location-uri=gs://my-bucket --description="My new database" --properties=key1=value1,key2=value2
  request:
    collection: biglake.hive.v1beta.projects.catalogs.databases
    api_version: v1beta
    method: create

  arguments:
    params:
    - arg_name: database
      resource_spec: !REF googlecloudsdk.command_lib.biglake.resources:hive_database
      required: true
      is_positional: true
      is_primary_resource: true
      help_text: |
        The Hive Database to create.
    - arg_name: location-uri
      api_field: hiveDatabase.locationUri
      help_text: |
        The Cloud Storage location path where the database data will be stored.
        Format: gs://bucket/path/to/database
    - arg_name: description
      api_field: hiveDatabase.description
      help_text: |
        Description of the Hive database.
    - arg_name: parameters
      api_field: hiveDatabase.parameters.additionalProperties
      metavar: KEY=VALUE
      help_text: |
        Additional parameters associated with the database.
      type:
        arg_dict:
          flatten: true
          spec:
          - api_field: key
          - api_field: value
