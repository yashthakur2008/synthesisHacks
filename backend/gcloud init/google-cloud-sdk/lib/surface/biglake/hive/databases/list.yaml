- release_tracks: [ALPHA]
  help_text:
    brief: List BigLake Hive databases in a catalog.
    description: |
      List BigLake Hive databases in a catalog.
    examples: |-
        To list all BigLake Hive databases in catalog `my-catalog`, run:

          $ {command} --catalog=my-catalog

  request:
    collection: biglake.hive.v1beta.projects.catalogs.databases
    api_version: v1beta
    method: list

  response:
    id_field: name

  arguments:
    resource:
      help_text: |
        Arguments and flags that specify the Hive catalog to list databases from.
      spec: !REF googlecloudsdk.command_lib.biglake.resources:hive_catalog
