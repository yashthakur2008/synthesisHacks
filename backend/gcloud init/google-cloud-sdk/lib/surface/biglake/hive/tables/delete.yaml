- release_tracks: [ALPHA]
  help_text:
    brief: Deletes a BigLake Hive table.
    description: |
      Deletes a BigLake Hive table.
    examples: |-
      To delete a BigLake Hive table named 'my-table' in database 'my-database' and catalog 'my-catalog', run:

        $ {command} my-table --database=my-database --catalog=my-catalog

  request:
    collection: biglake.hive.v1beta.projects.catalogs.databases.tables
    api_version: v1beta
    method: delete

  arguments:
    params:
    - arg_name: table
      resource_spec: !REF googlecloudsdk.command_lib.biglake.resources:hive_table
      required: true
      is_positional: true
      is_primary_resource: true
      help_text: |
        The Hive Table to delete.
