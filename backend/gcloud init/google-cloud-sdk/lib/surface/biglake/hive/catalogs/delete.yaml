- release_tracks: [ALPHA]
  help_text:
    brief: Delete a BigLake Hive catalog.
    description: |
      Deletes a BigLake Hive catalog.
    examples: |-
      To delete a BigLake Hive catalog named 'my-catalog', run:
        $ {command} my-catalog

  request:
    collection: biglake.hive.v1beta.projects.catalogs
    ALPHA:
      api_version: v1beta
    method: delete

  arguments:
    params:
    - arg_name: catalog
      resource_spec: !REF googlecloudsdk.command_lib.biglake.resources:hive_catalog
      required: true
      is_positional: true
      is_primary_resource: true
      help_text: |
        The Hive Catalog to delete.
