- release_tracks: [ALPHA]
  help_text:
    brief: Update a BigLake Delta Sharing catalog.
    description: |
      Update a BigLake Delta Sharing catalog.
  # Note: For gcloud (non-alpha) regular, map to v1 later when implemented.
  request:
    collection: biglake.deltasharing.v1alpha.projects.catalogs
    api_version: delta_v1alpha
    method: patch
  arguments:
    resource:
      help_text: The Delta Sharing catalog to update.
      spec:
        name: catalog
        collection: biglake.deltasharing.v1alpha.projects.catalogs
        attributes:
        - attribute_name: project
          parameter_name: projectsId
          property: core/project
          help: The project of the catalog.
        - attribute_name: catalog
          parameter_name: catalogsId
          help: The Delta Sharing Catalog for the resource.
    params:
    - arg_name: connector-endpoint
      api_field: deltaSharingCatalog.sapConfig.sapBdcEnrollmentConfig.connectorEndpoint
      help_text: The SAP BDC Connector Endpoint.
    - arg_name: invitation-code
      api_field: deltaSharingCatalog.sapConfig.sapBdcEnrollmentConfig.invitationCode
      help_text: The SAP BDC Invitation Code.
    - arg_name: invitation-url
      api_field: deltaSharingCatalog.sapConfig.sapBdcEnrollmentConfig.invitationUrl
      help_text: The combined invitation URL containing both endpoint and code.
    - arg_name: refresh-interval
      api_field: deltaSharingCatalog.refreshOptions.refreshSchedule.refreshInterval
      help_text: The interval for refreshing metadata from the remote catalog (e.g. 300s or 5m).
      type: "googlecloudsdk.calliope.arg_parsers:Duration:"
      processor: googlecloudsdk.command_lib.biglake.delta_sharing:GetDurationString
