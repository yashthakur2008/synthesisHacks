- release_tracks: [ALPHA]
  help_text:
    brief: List BigLake Delta Sharing schemas.
    description: |
      List BigLake Delta Sharing schemas.
  request:
    collection: biglake.deltasharing.v1alpha.projects.catalogs.shares.schemas
    api_version: delta_v1alpha
    method: list
    modify_request_hooks:
    - googlecloudsdk.command_lib.biglake.delta_sharing:SetParentForList
  arguments:
    resource:
      help_text: The share to list schemas from.
      spec:
        name: share
        collection: biglake.deltasharing.v1alpha.projects.catalogs.shares
        attributes:
        - attribute_name: project
          parameter_name: projectsId
          property: core/project
          help: The project.
        - attribute_name: catalog
          parameter_name: catalogsId
          help: The BigQuery catalog ID.
        - attribute_name: share
          parameter_name: sharesId
          help: The share ID.
  output:
    format: |
      table(
        name.basename():label=ID
      )
