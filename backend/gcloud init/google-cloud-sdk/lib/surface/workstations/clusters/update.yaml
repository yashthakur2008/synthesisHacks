- release_tracks: [GA, BETA, ALPHA]

  help_text:
    brief: |
      Update a workstation cluster.
    description: |
      Update a workstation cluster.
    examples: |
      To update the display name of workstation cluster `my-cluster` in region `us-central1`, run:

        $ {command} my-cluster --region=us-central1 --display-name='My New Cluster Name'

  arguments:
    resource:
      spec: !REF googlecloudsdk.command_lib.workstations.resources:cluster
      help_text: |
        Arguments and flags that specify the cluster to update.
    params:
    - arg_name: display-name
      api_field: workstationCluster.displayName
      type: str
      help_text: |
        Human-readable name for this workstation cluster.
    - arg_name: enable-http2
      api_field: workstationCluster.gatewayConfig.http2Enabled
      type: bool
      help_text: |
        Enable or disable HTTP/2 for the workstation cluster.
    labels:
      api_field: workstationCluster.labels

  request:
    GA:
      api_version: v1
    BETA:
      api_version: v1beta
    ALPHA:
      api_version: v1beta
    collection: workstations.projects.locations.workstationClusters

  async:
    collection: workstations.projects.locations.operations

  update:
    read_modify_update: true
