$schema: "http://json-schema.org/draft-06/schema#"

type: object
additionalProperties: false
required: [root_dir, apis]

properties:
  root_dir:
    type: string

  canonical_surfaces:
    type: object
    patternProperties:
      "^[a-z0-9_]+$":
        type: object
        additionalProperties: false
        required: [name]
        properties:
          name:
            type: string
          command:
            type: string
          hidden:
            type: boolean
          help_text:
            type: string

  apis:
    type: object
    patternProperties:
      "^[a-z0-9_]+$":
        type: object
        additionalProperties: false
        patternProperties:
          "^[a-z0-9_]+$":
            type: object
            additionalProperties: false
            properties:
              discovery_doc:
                type: string
              default:
                type: boolean
              enable_mtls:
                type: boolean
              mtls_endpoint_override:
                type: string
              gcloud_gapic_library:
                type: string
              unelidable_request_methods:
                type: array
                items:
                  type: string
              skip:
                type: object
                additionalProperties: false
                required: [bug]
                properties:
                  bug:
                    type: string
              resources:
                type: object
                patternProperties:
                  ".*":
                    type: object
                    additionalProperties: false
                    required: [path]
                    properties:
                      path:
                        type: string
                      gapic_compatible:
                        type: boolean
                      apitools_compatible:
                        type: boolean
                      enable_uri_parsing:
                        type: boolean
